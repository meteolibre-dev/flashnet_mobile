version: "3.8"

services:
  lightning-server-go:
    build: .
    ports:
      - "3001:8080"
    environment:
      - PORT=8080
      - BUCKET_BASE_URL=gs://inference_result_meteolibre_forecast/forecasts
      - GOMAXPROCS=4
      - GDAL_CACHEMAX=500
      # For GCS auth, set one of:
      # - GCP_CREDENTIALS_B64=<base64-encoded service account JSON>
      # - GCP_CREDENTIALS=<raw service account JSON>
      # - GOOGLE_APPLICATION_CREDENTIALS=/path/to/key.json
      # Or run on GCP with Workload Identity (metadata server auto-detected)
    restart: unless-stopped
