name: Deploy Benchmark API

on:
  push:
    branches:
      - main
    paths:
      - 'benchmark-api/**'
      - '.github/workflows/deploy-benchmark-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID: meteoforecast
  GAR_LOCATION: europe-west3
  SERVICE: benchmark-api
  REPOSITORY: flashnet-repo
  IMAGE_NAME: benchmark-api
  CONTEXT_DIR: benchmark-api

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        run: 'gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet'

      - name: Get Short Git SHA
        id: git-sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 'Build and Push Container Image'
        run: |
          docker build \
            -f ${{ env.CONTEXT_DIR }}/Dockerfile \
            --tag ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }} \
            --tag ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.CONTEXT_DIR }}

          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: 'Deploy to Cloud Run'
        run: |
          CREDENTIALS_B64=$(echo '${{ secrets.GCP_CREDENTIALS }}' | base64 -w 0)

          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }} \
            --region ${{ env.GAR_LOCATION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars BUCKET_NAME=inference_result_meteolibre_forecast,FORECASTS_PREFIX=forecasts,GCP_CREDENTIALS_B64=$CREDENTIALS_B64
