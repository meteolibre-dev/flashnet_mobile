name: Deploy Lightning Server Go

on:
  push:
    branches:
      - main
    paths:
      - 'lightning-server-go/**'
      - '.github/workflows/deploy-lightning-server-v2.yml'
  workflow_dispatch:

env:
  PROJECT_ID: meteoforecast
  GAR_LOCATION: europe-west3
  REPOSITORY: flashnet-repo

jobs:
  deploy-go:
    name: Build & Deploy Go (GDAL cgo)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      SERVICE: lightning-server-go
      IMAGE_NAME: lightning-server-go
      CONTEXT_DIR: lightning-server-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        run: 'gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet'

      - name: Get Short Git SHA
        id: git-sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 'Build and Push Container Image'
        run: |
          docker build \
            -f ${{ env.CONTEXT_DIR }}/Dockerfile \
            --tag ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }} \
            --tag ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.CONTEXT_DIR }}

          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: 'Deploy to Cloud Run'
        run: |
          # Encode credentials to base64 to handle special characters
          CREDENTIALS_B64=$(echo '${{ secrets.GCP_CREDENTIALS }}' | base64 -w 0)
          
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.git-sha.outputs.SHORT_SHA }} \
            --region ${{ env.GAR_LOCATION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 4 \
            --set-env-vars BUCKET_BASE_URL=gs://inference_result_meteolibre_forecast/forecasts,GCP_CREDENTIALS_B64=$CREDENTIALS_B64,GOMAXPROCS=2
